<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VeloAnalyzer — Race Reports</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div class="container">
    <header class="site-header">
      <h1>🚵 VeloAnalyzer</h1>
      <p class="header-sub">
        UCI-enriched MTB start list analysis &nbsp;·&nbsp;
        Updated: <span id="generated-at">—</span> &nbsp;·&nbsp;
        Ranking data © <a href="https://www.uci.org" target="_blank">uci.org</a>
      </p>
    </header>

    <p id="loading">Loading database…</p>

    <div id="app">
      <div class="race-selector">
        <select id="race-select" aria-label="Select race"></select>
      </div>

      <div class="race-meta">
        <strong id="race-name"></strong>
        <span id="race-date"></span> &nbsp;·&nbsp;
        <span id="race-cat"></span>
      </div>

      <div id="stats-area"></div>

      <div class="legend">
        <span><span class="legend-dot" style="background:#68d391"></span>TOP 50</span>
        <span><span class="legend-dot" style="background:#9ae6b4"></span>TOP 51–200</span>
        <span><span class="legend-dot" style="background:#f6e05e"></span>Ranked 201+</span>
        <span><span class="legend-dot" style="background:#4a5568"></span>Unranked</span>
        <span style="color:#718096; font-size:.8rem">Click two riders to compare</span>
      </div>

      <input
        id="search-input"
        class="search-box"
        type="search"
        placeholder="Search by name, country or team…"
        aria-label="Search riders"
      />

      <div id="table-area"></div>

      <p class="section-title">Starters by country</p>
      <div id="country-area"></div>

      <p class="section-title">Starters by team</p>
      <div id="team-area"></div>
    </div>

    <footer class="site-footer">
      Generated by <a href="https://github.com/jfulem/veloanalyzer" target="_blank">veloanalyzer</a>
    </footer>
  </div>

  <!-- Rider detail modal -->
  <div id="rider-backdrop" class="modal-backdrop" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="rider-modal-title">
      <div class="modal-header">
        <h2 id="rider-modal-title">Rider Profile</h2>
        <button id="rider-close" class="modal-close" aria-label="Close">✕</button>
      </div>
      <div class="modal-body" id="rider-card"></div>
    </div>
  </div>

  <!-- H2H modal -->
  <div id="h2h-backdrop" class="modal-backdrop" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-header">
        <h2 id="modal-title">⚔ Head-to-Head</h2>
        <button id="h2h-close" class="modal-close" aria-label="Close">✕</button>
      </div>
      <div class="modal-body" id="h2h-panel"></div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
