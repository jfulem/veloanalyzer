name: Generate Race Reports

on:
  push:
    branches: [main]
    paths: [races.yml]        # run when race list changes
  schedule:
    - cron: "0 12 * * *"      # every day at 12:00 UTC (fresh rankings)
  workflow_dispatch:
    inputs:
      force_refresh:
        description: 'Force re-download of UCI ranking cache'
        type: boolean
        default: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Get current ISO week
        id: week
        run: echo "week=$(date +%G-W%V)" >> $GITHUB_OUTPUT

      - name: Cache UCI ranking data
        uses: actions/cache@v4
        with:
          path: .mtb_cache
          key: mtb-cache-${{ runner.os }}-${{ steps.week.outputs.week }}-${{ hashFiles('races.yml') }}${{ inputs.force_refresh && format('-bust{0}', github.run_id) || '' }}
          restore-keys: |
            mtb-cache-${{ runner.os }}-${{ steps.week.outputs.week }}-
            mtb-cache-${{ runner.os }}-

      - name: Generate data.db
        run: uv run python scripts/generate_site.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
