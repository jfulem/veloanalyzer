name: Generate Race Reports

on:
  push:
    branches: [main]
    paths: [races.yml]        # run when race list changes
  schedule:
    - cron: "0 12 * * *"      # every day at 12:00 UTC (fresh rankings)
  workflow_dispatch:           # manual trigger from GitHub Actions UI

permissions:
  contents: write              # needed to push docs/ back to the repo

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Cache UCI ranking data
        uses: actions/cache@v4
        with:
          path: .mtb_cache
          key: mtb-cache-${{ runner.os }}-${{ hashFiles('races.yml') }}
          restore-keys: mtb-cache-${{ runner.os }}-

      - name: Generate reports
        run: uv run python scripts/generate_site.py

      - name: Commit and push reports
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet && echo "No changes to commit" || \
            git commit -m "chore: update race reports [skip ci]" && git push
